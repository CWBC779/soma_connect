name: CI build check

# Compiles feature branches WITHOUT deploying, so changes can be validated
# before merging to main (main has its own deploy workflow).
on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings || true
      - run: flutter build web --release --base-href /soma_connect/
