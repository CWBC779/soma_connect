name: Deploy web to GitHub Pages

# Builds the Flutter web app and publishes it to GitHub Pages.
# After the first run, enable Pages: repo Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch: # lets you run it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # base-href must match the project page path: https://<user>.github.io/soma_connect/
      - run: flutter build web --release --base-href /soma_connect/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
