name: SOMA connect
description: Female athlete performance intelligence platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Charts
  fl_chart: ^0.68.0

  # Icons
  cupertino_icons: ^1.0.6

  # Local storage
  shared_preferences: ^2.2.2

  # Google Fonts
  google_fonts: ^6.1.0

  # Smooth page indicator
  smooth_page_indicator: ^1.1.0

  # Intl for date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true