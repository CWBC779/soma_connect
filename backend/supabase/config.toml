# Supabase project config for the SOMA Connect research backend.
# Run Supabase commands from the `backend` folder (where this `supabase/`
# directory lives), e.g.:  cd backend ; supabase functions deploy strava-auth
project_id = "soma_connect"

# Public "Sign in with a study code": validates the code, mints a session.
[functions.code-login]
verify_jwt = false

# (Legacy, unused) Strava login/data functions — kept deployed but no longer
# called by the app, which now uses study-code login + CSV upload.
[functions.strava-login]
verify_jwt = false

# Authenticated: the app sends the logged-in participant's Supabase JWT.
[functions.strava-auth]
verify_jwt = true

# Public: Strava calls this. Protected by the hub.verify_token handshake.
[functions.strava-webhook]
verify_jwt = false

# Public endpoint protected by the x-cron-secret header; called by pg_cron.
[functions.strava-sync]
verify_jwt = false
