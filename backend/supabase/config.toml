# Minimal Supabase config so the CLI recognises this folder as a project and
# can deploy the strava-auth Edge Function.
#
# Run Supabase commands from the `backend` folder (where this `supabase/`
# directory lives), e.g.:  cd backend ; supabase functions deploy strava-auth
project_id = "soma_connect"

[functions.strava-auth]
# Public function (no Supabase auth needed to call it). Equivalent to the
# deprecated --no-verify-jwt flag.
verify_jwt = false
